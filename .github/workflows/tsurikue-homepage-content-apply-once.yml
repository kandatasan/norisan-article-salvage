name: Tsurikue homepage content apply once

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/tsurikue-homepage-content-apply-once.yml"

jobs:
  apply:
    if: ${{ github.head_ref == 'homepage-content-strengthen-20260711' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      OUTPUT_DIR: reports/tsurikue-homepage-content-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        run: python -m unittest tests/test_tsurikue_homepage_content.py -v

      - name: Apply approved homepage content
        env:
          TSURIKUE_WP_USER: ${{ secrets.TSURIKUE_WP_USER }}
          TSURIKUE_WP_APP_PASSWORD: ${{ secrets.TSURIKUE_WP_APP_PASSWORD }}
        run: >-
          python scripts/tsurikue_homepage_content.py
          --mode apply
          --site-url https://tsurikue.com
          --output-dir "$OUTPUT_DIR"
          --apply-confirmation "APPLY-HOMEPAGE-CONTENT-20260711"

      - name: Upload apply artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsurikue-homepage-content-apply
          path: ${{ env.OUTPUT_DIR }}/
          if-no-files-found: warn
