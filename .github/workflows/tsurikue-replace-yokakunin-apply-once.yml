name: Tsurikue replace 要確認 apply once

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/tsurikue-replace-yokakunin-apply-once.yml"

jobs:
  apply:
    if: ${{ github.head_ref == 'replace-yokakunin-20260711' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      OUTPUT_DIR: reports/tsurikue-yokakunin-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        run: python -m unittest tests/test_tsurikue_replace_yokakunin.py -v

      - name: Apply approved replacements
        env:
          TSURIKUE_WP_USER: ${{ secrets.TSURIKUE_WP_USER }}
          TSURIKUE_WP_APP_PASSWORD: ${{ secrets.TSURIKUE_WP_APP_PASSWORD }}
        run: >-
          python scripts/tsurikue_replace_yokakunin.py
          --mode apply
          --site-url https://tsurikue.com
          --output-dir "$OUTPUT_DIR"
          --apply-confirmation "APPLY-YOKAKUNIN-20260711"

      - name: Upload apply artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsurikue-yokakunin-apply
          path: ${{ env.OUTPUT_DIR }}/
          if-no-files-found: warn
