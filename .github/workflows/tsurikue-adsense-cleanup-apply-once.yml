name: Tsurikue AdSense cleanup apply once

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/tsurikue-adsense-cleanup-apply-once.yml"

jobs:
  apply:
    if: ${{ github.head_ref == 'adsense-cleanup-dry-run-check' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read

    env:
      OUTPUT_DIR: reports/tsurikue-adsense-cleanup-no-alt-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Apply approved no-alt cleanup
        env:
          TSURIKUE_WP_USER: ${{ secrets.TSURIKUE_WP_USER }}
          TSURIKUE_WP_APP_PASSWORD: ${{ secrets.TSURIKUE_WP_APP_PASSWORD }}
        run: >-
          python scripts/run_tsurikue_adsense_cleanup_no_alt_with_retry.py
          --mode apply
          --site-url https://tsurikue.com
          --output-dir "$OUTPUT_DIR"
          --apply-confirmation "APPLY-ADSENSE-CLEANUP-20260711"

      - name: Upload apply artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsurikue-adsense-cleanup-no-alt-apply
          path: ${{ env.OUTPUT_DIR }}/
          if-no-files-found: warn
