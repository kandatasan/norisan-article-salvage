name: Tsurikue AdSense cleanup

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: authenticated-dry-run
        type: choice
        options:
          - authenticated-dry-run
          - apply
      apply_confirmation:
        description: "Required only for apply mode: APPLY-ADSENSE-CLEANUP-20260711"
        required: false
        default: ""
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    env:
      OUTPUT_DIR: reports/tsurikue-adsense-cleanup-no-alt
      RUN_MODE: ${{ inputs.mode }}
      APPLY_CONFIRMATION_INPUT: ${{ inputs.apply_confirmation }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Validate apply confirmation
        if: ${{ inputs.mode == 'apply' && inputs.apply_confirmation != 'APPLY-ADSENSE-CLEANUP-20260711' }}
        run: |
          echo "apply mode requires the exact confirmation string."
          exit 1

      - name: Run authenticated cleanup mode
        env:
          TSURIKUE_WP_USER: ${{ secrets.TSURIKUE_WP_USER }}
          TSURIKUE_WP_APP_PASSWORD: ${{ secrets.TSURIKUE_WP_APP_PASSWORD }}
        run: >-
          python scripts/run_tsurikue_adsense_cleanup_no_alt_with_retry.py
          --mode "$RUN_MODE"
          --site-url https://tsurikue.com
          --output-dir "$OUTPUT_DIR"
          --apply-confirmation "$APPLY_CONFIRMATION_INPUT"

      - name: Upload cleanup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsurikue-adsense-cleanup-no-alt-${{ env.RUN_MODE }}
          path: ${{ env.OUTPUT_DIR }}/
          if-no-files-found: warn
